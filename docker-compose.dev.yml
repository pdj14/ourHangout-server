services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ourhangout-dev-migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
    command: sh -c "node dist/scripts/migrate.js"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ourhangout-dev-api
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "node dist/server.js"
    volumes:
      - ./logs:/app/logs
      - ./storage/media:/app/storage/media
      - ./storage/app-updates:/app/storage/app-updates

  postgres:
    image: postgres:16-alpine
    container_name: ourhangout-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ourhangout_dev}
      POSTGRES_USER: ${POSTGRES_USER:-ourhangout_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ourhangout_dev_pw}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ourhangout_dev} -d ${POSTGRES_DB:-ourhangout_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ourhangout-dev-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
  redis_data_dev:
